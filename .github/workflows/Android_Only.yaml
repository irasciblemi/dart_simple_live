name: Build Android Only

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  build-android:
    runs-on: ubuntu-latest # 使用 Linux 环境编译 Android，速度最快
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev # 强制签出 dev 分支

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x' # 保持与原项目一致
          cache: true

      - name: Get Dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build APK (Unsigned)
        run: |
          cd simple_live_app
          # 编译 release 版 APK，不指定 keystore 默认生成 unsiged 包
          flutter build apk --release --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
