name: Build Android Only (Final Fix)

on:
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      # 关键修复：确保在 android/app 目录下生成伪造文件
      - name: Create Dummy Key Properties
        run: |
          # 进入安卓应用核心目录
          cd simple_live_app/android/app
          # 生成一个真正的空 jks 文件，确保存档路径正确
          touch debug.jks
          # 生成配置文件，注意 storeFile 路径现在就在当前目录
          echo "storeFile=debug.jks" > ../key.properties
          echo "storePassword=password123" >> ../key.properties
          echo "keyPassword=password123" >> ../key.properties
          echo "keyAlias=debug" >> ../key.properties

      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build APK
        run: |
          cd simple_live_app
          # 使用 --no-tree-shake-icons 有时能避免一些编译环境下的资源错误
          flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-apks
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
