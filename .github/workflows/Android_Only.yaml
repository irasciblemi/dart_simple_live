name: Build Android (No Signature Fix)

on:
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      # 关键一步：从代码层面移除签名配置逻辑
      - name: Patch Build Gradle
        run: |
          cd simple_live_app/android/app
          # 这一行命令的意思是：把 build.gradle.kts 里关于 signingConfigs.release 的配置行直接注释掉
          # 或者强制让 release 编译使用 debug 的默认签名
          sed -i 's/signingConfig = signingConfigs.getByName("release")/signingConfig = signingConfigs.getByName("debug")/g' build.gradle.kts || true

      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build APK
        run: |
          cd simple_live_app
          # 编译 release 模式，但由于我们改了配置，它会使用 Flutter 默认的 debug 签名，这样就能编出来了
          flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-apks
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
