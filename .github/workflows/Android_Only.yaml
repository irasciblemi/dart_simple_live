name: Build Android APK (Clean & Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev

      # 2. Java 环境
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      # 3. Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      # 4. 创建标准 debug keystore（关键）
      - name: Create Debug Keystore
        run: |
          cd simple_live_app/android
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      # 5. 创建 key.properties（兼容项目强制读取）
      - name: Create key.properties
        run: |
          cd simple_live_app/android
          cat > key.properties <<EOF
          storeFile=debug.keystore
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          EOF

      # 6. 获取依赖
      - name: Flutter Pub Get
        run: |
          cd simple_live_app
          flutter pub get

      # 7. 构建 Debug APK（最稳）
      - name: Build Debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug

      # 8. 上传
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-debug-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
